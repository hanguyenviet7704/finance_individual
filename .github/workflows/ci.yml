name: CI — Build & Test

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  # ─────────────────────────────────────────
  # Job 1: Test Backend (Java / Maven)
  # ─────────────────────────────────────────
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - account-service
          - payment-service
          - fraud-service
          - loan-service
          - notification-service
          - report-service
          - audit-service
          - stock-service

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Run tests for ${{ matrix.service }}
        run: |
          mvn -pl services/${{ matrix.service }} test -DskipTests=false
        env:
          SPRING_PROFILES_ACTIVE: test

  # ─────────────────────────────────────────
  # Job 2: Test Frontend (Vite / Vitest)
  # ─────────────────────────────────────────
  test-frontend:
    name: Run Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run type check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build frontend (verify no compile errors)
        run: npm run build
        working-directory: frontend
