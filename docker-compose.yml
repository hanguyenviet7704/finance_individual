version: "3.9"

# =====================================================
# Finance Microservices - Docker Compose
# =====================================================

networks:
  finance-network:
    driver: bridge

volumes:
  mysql-account-data:
  mysql-payment-data:
  mysql-fraud-data:
  mysql-loan-data:
  mongo-data:
  redis-data:
  kafka-data:
  zookeeper-data:

services:

  # ===================
  # INFRASTRUCTURE
  # ===================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    networks: [finance-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: finance-kafka
    networks: [finance-network]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://finance-kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: finance-redis
    networks: [finance-network]
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL instances — mỗi service có DB riêng (Database per Service pattern)
  mysql-account:
    image: mysql:8.0
    container_name: mysql-account
    networks: [finance-network]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: account_db
    volumes:
      - mysql-account-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-payment:
    image: mysql:8.0
    container_name: mysql-payment
    networks: [finance-network]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: payment_db
    volumes:
      - mysql-payment-data:/var/lib/mysql
    ports:
      - "3318:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-fraud:
    image: mysql:8.0
    container_name: mysql-fraud
    networks: [finance-network]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: fraud_db
    volumes:
      - mysql-fraud-data:/var/lib/mysql
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql-loan:
    image: mysql:8.0
    container_name: mysql-loan
    networks: [finance-network]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: loan_db
    volumes:
      - mysql-loan-data:/var/lib/mysql
    ports:
      - "3310:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # MongoDB — dùng chung cho loan, notification, report, audit
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    networks: [finance-network]
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-admin123}
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 10

  # ===================
  # PLATFORM
  # ===================

  eureka-server:
    build:
      context: ./services/eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    networks: [finance-network]
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    networks: [finance-network]
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}
      REDIS_HOST: finance-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-finance-secret-key-must-be-at-least-256-bits-long-for-hs256}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/fallback/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ===================
  # MICROSERVICES
  # ===================

  account-service:
    build:
      context: ./services/account-service
      dockerfile: Dockerfile
    container_name: account-service
    networks: [finance-network]
    ports:
      - "8081:8081"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-account:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-account
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      KAFKA_SERVERS: finance-kafka:9092
      REDIS_HOST: finance-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-finance-secret-key-must-be-at-least-256-bits-long-for-hs256}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: payment-service
    networks: [finance-network]
    ports:
      - "8082:8082"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-payment
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      KAFKA_SERVERS: finance-kafka:9092
      REDIS_HOST: finance-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  fraud-service:
    build:
      context: .
      dockerfile: services/fraud-service/Dockerfile
    container_name: fraud-service
    networks: [finance-network]
    ports:
      - "8083:8083"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-fraud:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-fraud
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      KAFKA_SERVERS: finance-kafka:9092
      REDIS_HOST: finance-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}

  loan-service:
    build:
      context: .
      dockerfile: services/loan-service/Dockerfile
    container_name: loan-service
    networks: [finance-network]
    ports:
      - "8084:8084"
    depends_on:
      eureka-server:
        condition: service_healthy
      mysql-loan:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-loan
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      MONGO_HOST: mongodb
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      KAFKA_SERVERS: finance-kafka:9092
      REDIS_HOST: finance-redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: notification-service
    networks: [finance-network]
    ports:
      - "8085:8085"
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      KAFKA_SERVERS: finance-kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
    container_name: report-service
    networks: [finance-network]
    ports:
      - "8086:8086"
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      KAFKA_SERVERS: finance-kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: audit-service
    networks: [finance-network]
    ports:
      - "8087:8087"
    depends_on:
      eureka-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MONGO_HOST: mongodb
      MONGO_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-admin123}
      KAFKA_SERVERS: finance-kafka:9092
      EUREKA_HOST: eureka-server
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin123}

  # ===================
  # FRONTEND
  # ===================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    networks: [finance-network]
    ports:
      - "3000:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
