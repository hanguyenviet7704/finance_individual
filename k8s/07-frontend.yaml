# =====================================================
#  Frontend (React/Nginx)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: finance
spec:
  replicas: 2   # 2 bản sao để tăng tính sẵn sàng
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      enableServiceLinks: false
      containers:
        - name: frontend
          image: gcr.io/finance-493401/finance-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: finance
spec:
  type: LoadBalancer    # GKE sẽ tự cấp External IP
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
