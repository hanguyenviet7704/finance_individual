# =====================================================
#  MYSQL - account-db
# =====================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-account
  namespace: finance
spec:
  serviceName: mysql-account
  replicas: 1
  selector:
    matchLabels:
      app: mysql-account
  template:
    metadata:
      labels:
        app: mysql-account
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finance-secrets
                  key: DB_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: finance-config
                  key: MYSQL_ACCOUNT_DB
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
            initialDelaySeconds: 20
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-account
  namespace: finance
spec:
  clusterIP: None
  selector:
    app: mysql-account
  ports:
    - port: 3306
---
