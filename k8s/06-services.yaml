# Helper macro for env injection — copied on each microservice Deployment
# Each service only differs in: name, image, containerPort, MYSQL_HOST env var
# =====================================================
#  account-service (8081)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      enableServiceLinks: false
      containers:
        - name: account-service
          image: gcr.io/finance-493401/finance-account-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: finance-config
            - secretRef:
                name: finance-secrets
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: finance-config
                  key: MYSQL_ACCOUNT_HOST
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
  namespace: finance
spec:
  selector:
    app: account-service
  ports:
    - port: 8081
---
