# =====================================================
#  Eureka Server (Service Registry)
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
  namespace: finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      enableServiceLinks: false
      containers:
        - name: eureka-server
          image: gcr.io/finance-493401/finance-eureka-server:latest   # build locally, then push to GCR or Artifact Registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8761
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
  namespace: finance
spec:
  selector:
    app: eureka-server
  ports:
    - port: 8761
      targetPort: 8761
---
# =====================================================
#  API Gateway
# =====================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: finance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      enableServiceLinks: false
      containers:
        - name: api-gateway
          image: gcr.io/finance-493401/finance-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: finance-config
            - secretRef:
                name: finance-secrets
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
            successThreshold: 1
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: finance
spec:
  type: LoadBalancer     # Tạo External IP tự động trên GKE
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 80
      targetPort: 8080
