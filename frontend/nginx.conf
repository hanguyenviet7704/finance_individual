server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Dùng CoreDNS của k8s để resolve service name động tại runtime
    resolver kube-dns.kube-system.svc.cluster.local valid=30s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # SPA routing — redirect 404 về index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls đến backend gateway
    # Dùng full FQDN + set variable để Nginx resolve DNS tại request time (không phải lúc startup)
    location /api/ {
        set $upstream http://api-gateway.finance.svc.cluster.local;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
